name: Weekly scrape

on:
  schedule:
    - cron: '30 3 * * 1' # Mondays 09:00 IST (03:30 UTC). Switch to daily
                         # ('30 3 * * *') during announcement seasons.
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions: { contents: write, issues: write }
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: { python-version: '3.12' }
      - run: pip install requests beautifulsoup4 psycopg2-binary
      - run: python scraper/main.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GH_TOKEN: ${{ github.token }}
      - name: Commit snapshots
        run: |
          git config user.name scraper-bot
          git config user.email bot@users.noreply.github.com
          git add scraper/snapshots && git commit -m 'chore: snapshots' || true
          git push
